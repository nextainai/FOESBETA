<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOES - (BETA)</title>
    <link rel="stylesheet" href="style.css">
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- 3D Canvas Container -->
    <div id="game-container"></div>

    <!-- Damage Flash Overlay -->
    <div id="damage-overlay"></div>

    <!-- Crosshair -->
    <div id="crosshair">
        <div class="ch-dot ch-h"></div>
        <div class="ch-dot ch-v"></div>
        <div class="ch-dot ch-center"></div>
    </div>

    <!-- Main Menu -->
    <div id="main-menu" class="menu-screen">
        <h1>FOES</h1>
        <div class="subtitle">Developed by Av2arx Games</div>
        
        <div class="menu-options">
            <div class="option-group">
                <label>CHARACTER:</label>
                <select id="char-select">
                    <option value="balanced">Balanced (Default)</option>
                    <option value="speed">Speedster</option>
                    <option value="tank">Tank</option>
                </select>
            </div>

            <div class="option-group">
                <label>DIFFICULTY:</label>
                <select id="diff-select">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
        </div>

        <button class="btn" id="start-btn">PLAY NOW</button>
        <div class="dev-info">Developer: Ritam Das</div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over" class="menu-screen hidden">
        <h1 style="color: white;">GAME OVER</h1>
        <h2 id="final-score">Kills: 0</h2>
        <button class="btn" id="restart-btn">MAIN MENU</button>
    </div>

    <!-- HUD (Heads Up Display) -->
    <div id="hud" class="ui-layer hidden">
        <div class="hud-top">
            <div class="leaderboard">
                <div class="lb-header">LEADERBOARD</div>
                <div id="lb-content"></div>
            </div>
            <div class="kill-feed" id="kill-feed"></div>
        </div>
        <div class="hud-bottom">
            <div class="health-container">
                <div class="health-bar-container">
                    <div class="health-fill" id="health-fill"></div>
                    <div class="health-text" id="health-text">100</div>
                </div>
            </div>
            <div class="ammo-display">
                <span id="ammo-current">25</span> / <span id="ammo-total">90</span>
            </div>
        </div>
    </div>

    <!-- Main Script (Type Module enables imports) -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
